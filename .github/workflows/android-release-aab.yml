name: Android Release AAB

on:
  workflow_dispatch:

jobs:
  android-release-aab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Sync Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Validate release signing secrets
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

      - name: Restore release keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/android-signing"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/release-keystore.jks"
          test -s "$RUNNER_TEMP/android-signing/release-keystore.jks"

      - name: Build signed release AAB
        working-directory: android
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/android-signing/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify signed release AAB
        working-directory: android
        shell: bash
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          test -f "$AAB_PATH"
          jarsigner -verify "$AAB_PATH" > "$RUNNER_TEMP/android-signing/jarsigner-result.txt"
          cat "$RUNNER_TEMP/android-signing/jarsigner-result.txt"
          grep -q "jar verified." "$RUNNER_TEMP/android-signing/jarsigner-result.txt"

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: harupuli-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
